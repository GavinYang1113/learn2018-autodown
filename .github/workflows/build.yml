name: Build executables

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            artifact: learn-windows
          - os: macos-latest
            name: macos
            artifact: learn-macos
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile learn.py --name ${{ matrix.artifact }}

      - name: Add launch scripts and readme
        shell: bash
        run: |
          mkdir package
          cp dist/* package/
          cp README-双击运行说明.txt package/
          if [ "${{ matrix.name }}" = "windows" ]; then
            cp run.bat package/
          else
            cp run.command package/
            chmod +x package/run.command
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: package/
